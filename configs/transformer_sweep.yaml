data:
  seq_len: 360
  forecast_horizon: 1
  window_stride:
  dynamic_inputs:
    - prcp
    - tmax
    - tmin
    - srad
    - vp
  target_variable: qobs
  static_attributes:
    - lat
    - lon
    - elev_mean
    - slope_mean
    - area_km2
    - mean_prcp
    - mean_pet
    - aridity
    - frac_snow
    - soil_depth_pelletier
    - frac_forest
    - lai_max
  split_strategy: stratified
  split_stratify_attribute: aridity
  train_basin_count: 30
  val_basin_count: 10
  test_basin_count: 10

model:
  name: transformer
  hidden_size: 64
  num_layers: 2
  nhead: 4
  dim_feedforward: 128
  dropout: 0.1

training:
  epochs: 100
  batch_size: 128
  learning_rate: 0.001
  loss: nse
  weight_decay: 0.00001
  grad_clip: 1.0
  patience: 10
  min_delta: 0.0
  seed: 42
  device: auto
  num_workers: 2
  output_dir: outputs
  checkpoint_path: outputs/transformer_MSE_T1/best_model.pt

sweep:
  output_root: output/transformer_MSE_T1
  eval_batch_size: 128
  evaluate: true
  loss: mse
  learning_rate: 0.001
  grid:
    seq_len: [ 90, 120,150,180]
    hidden_size: [32, 64, 128,]
    batch_size: [32, 64, 128, ]
    learning_rate: [0.001, 0.0001]
    dropout: [0.1, 0.2]

