data:
  seq_len: 30
  forecast_horizon: 1
  dynamic_inputs:
    - prcp
    - tmax
    - tmin
    - srad
    - vp
  target_variable: qobs

model:
  name: lstm
  hidden_size: 64
  num_layers: 1
  dropout: 0.0

training:
  epochs: 20
  batch_size: 64
  learning_rate: 0.001
  checkpoint_path: outputs/best_model.pt
