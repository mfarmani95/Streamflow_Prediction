data:
  seq_len: 360
  forecast_horizon: 1
  # null means use non-overlapping windows with stride equal to seq_len.
  window_stride:
  dynamic_inputs:
    - prcp
    - tmax
    - tmin
    - srad
    - vp
  target_variable: qobs
  static_attributes:
    - lat
    - lon
    - elev_mean
    - slope_mean
    - area_km2
    - mean_prcp
    - mean_pet
    - aridity
    - frac_snow
    - soil_depth_pelletier
    - frac_forest
    - lai_max
  train_basin_count: 30
  val_basin_count: 10
  test_basin_count: 10

model:
  name: lstm
  hidden_size: 64
  num_layers: 1
  dropout: 0.1

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  loss: mse
  weight_decay: 0.00001
  grad_clip: 1.0
  patience: 10
  min_delta: 0.0
  seed: 42
  device: auto
  num_workers: 2
  output_dir: outputs
  checkpoint_path: outputs/best_model.pt
